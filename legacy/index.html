<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legacy Documentation | Shadow.net</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00f2ff;
            --secondary: #ff00ff;
            --accent: #7700ff;
            --dark: #0a0a0f;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--dark);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: var(--dark);
        }

        .pattern-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.08;
            background-image: url('../assets/patterned-background.png');
            background-size: 200px;
            background-repeat: repeat;
            mix-blend-mode: screen;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at center, transparent 0%, var(--dark) 90%);
            pointer-events: none;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--primary);
            border-radius: 50%;
            animation: float 20s infinite linear;
            opacity: 0.8;
            box-shadow: 0 0 8px var(--primary), 0 0 15px var(--primary);
        }

        @keyframes float {
            from { transform: translateY(150vh) translateX(0); }
            to { transform: translateY(-50vh) translateX(100px); }
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.5;
            pointer-events: none;
            z-index: -1;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent), transparent 70%);
            top: 5%;
            right: 5%;
            animation: drift 25s infinite ease-in-out;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--secondary), transparent 70%);
            bottom: 10%;
            left: 5%;
            animation: drift 20s infinite ease-in-out reverse;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, var(--primary), transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: orbPulse 15s infinite ease-in-out;
        }

        @keyframes orbPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.6; }
        }

        .particle-blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            z-index: 100;
            background: var(--dark);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.6s ease;
            min-height: 380px;
            width: 100%;
            max-width: 600px;
            margin-top: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 0;
            transition: transform 0.6s ease;
            background-image: url('../assets/fon.webp');
        }

        .card:hover .card-bg {
            transform: scale(1.1);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(10,10,15,0.7) 0%, rgba(10,10,15,0.85) 50%, rgba(10,10,15,0.9) 100%);
            z-index: 1;
            transition: opacity 0.3s;
        }

        .card:hover .card-overlay {
            opacity: 0.95;
            background: linear-gradient(135deg, rgba(10,10,15,0.6) 0%, rgba(10,10,15,0.75) 50%, rgba(10,10,15,0.85) 100%);
        }

        .card-content {
            position: relative;
            z-index: 2;
            padding: 2.5rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-icon {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }

        .card:hover .card-icon {
            transform: rotate(-5deg) scale(1.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .card-icon svg {
            width: 45px;
            height: 45px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #fff, rgba(255,255,255,0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card p {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: fit-content;
        }

        .btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transform: translateX(5px);
            background: rgba(0, 0, 0, 0.6);
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(255, 170, 0, 0.8), rgba(255, 85, 0, 0.8));
            border: none;
            box-shadow: 0 4px 20px rgba(255, 170, 0, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 30px rgba(255, 170, 0, 0.5);
            transform: translateX(5px) scale(1.05);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--dark);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--primary), var(--accent));
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .card-content { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="pattern-bg"></div>
    <div class="grid-overlay"></div>
    <div class="vignette"></div>
    <div class="particles" id="particles"></div>
    <div class="particle-blocker"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <div class="container">
        <div class="card" onclick="window.location.href='../index.html'">
            <div class="card-bg"></div>
            <div class="card-overlay"></div>
            <div class="card-content">
                <div>
                    <div class="card-icon">
                        <svg viewBox="0 0 65.3 65.3" class="moon-crescent" style="fill: #ffffff; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));">
                            <g>
                                <g>
                                    <path d="M35.853,65.3c-18.089,0-32.805-14.565-32.805-32.655C3.048,14.791,17.573,0,35.427,0c0.01,0,0.018,0,0.025,0
                                        c0.757,0,1.449,0.278,1.789,0.957c0.343,0.686,0.263,1.434-0.205,2.041c-3.918,5.078-5.988,11.117-5.988,17.534

                                        C7.048,48.378,19.97,61.3,35.853,61.3c7.643,0,14.795-2.957,20.15-8.226c-16.282-1.911-28.955-15.793-28.955-32.58
                                        C27.048,14.629,28.568,9.013,31.475,4.034z"/>

                                <g>
                                    <path d="M37.349,58.464c-13.139,0-24.312-9.381-26.567-22.308c-0.095-0.543,0.27-1.063,0.813-1.156
                                        c0.552-0.094,1.063,0.27,1.157,0.812c2.087,11.967,12.432,20.651,24.597,20.651c0.553,0,1,0.446,1,1S37.902,58.464,37.349,58.464
                                        z"/>

                                <g>
                                    <path d="M11.416,34c-0.53,0-0.973-0.492-0.998-1.027c-0.022-0.463-0.034-0.97-0.034-1.439c0-0.553,0.447-1.019,1-1.019

                                </g>
                                <circle cx="40.41" cy="18.442" r="1.782"/>
                                <circle cx="51.992" cy="9.888" r="1.782"/>
                                <circle cx="48.117" cy="25.851" r="1.782"/>
                            </g>
                        </svg>

                    </div>
                    <h2>Legacy Documentation</h2>
                    <p>Сборник важной информации о legacy.</p>
                </div>
                <a href="../index.html" class="btn btn-primary">← Назад на главную</a>
            </div>
        </div>
    </div>

    <script>
        const particlesContainer = document.getElementById('particles');
        const colors = ['var(--primary)', 'var(--secondary)', 'var(--accent)', '#ffffff'];
        
        for (let i = 0; i < 60; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const color = colors[Math.floor(Math.random() * colors.length)];
            const size = Math.random() * 3 + 2;
            
            particle.style.left = Math.random() * 100 + '%';
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.background = color;
            particle.style.boxShadow = `0 0 ${size * 3}px ${color}, 0 0 ${size * 5}px ${color}`;
            particle.style.animationDuration = (Math.random() * 15 + 8) + 's';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.opacity = Math.random() * 0.6 + 0.3;
            particlesContainer.appendChild(particle);
        }

        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 20;
                const rotateY = (centerX - x) / 20;
                
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px) scale(1.02)`;
            });
            
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateY(0) scale(1)';
            });
        });
    </script>
</body>
</html>
